[tool.isort]
profile = "black"
line_length = 120
skip_glob = ["*/migrations/*", "*/.venv/*", "*/node_modules/*"]
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

# Treat django imports as third party for backwards compatibility
known_django = ["django"]
known_first_party = ["app"]
